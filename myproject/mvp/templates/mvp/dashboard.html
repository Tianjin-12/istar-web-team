<!DOCTYPE html>
<html>
<head>
  <title>AI 可见度评估系统 - Istar GEO</title>
  {% load plotly_dash %}
  {% load static %}
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <link rel="stylesheet" href="{% static 'vendor/bootstrap/bootstrap.min.css' %}">
  <link rel="stylesheet" href="{% static 'vendor/fonts/inter.css' %}">
  <style>
    * {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    }
    
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #0A0A0A;
    }
    
    #dashboard-container {
      width: 100%;
      height: 100vh;
      overflow: hidden;
    }
    
    #dashboard-container iframe {
      width: 100%;
      height: 100vh;
      border: none;
      overflow-y: auto;
    }
    
    /* Toast 提示 - 新配色 */
    .toast {
      position: fixed;
      bottom: 30px;
      right: 20px;
      background: #0F172A;
      color: white;
      padding: 14px 20px;
      border-radius: 12px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
      z-index: 10000;
      display: none;
      animation: toastIn 0.3s ease-out;
      min-width: 280px;
      border: 1px solid rgba(45, 212, 191, 0.2);
    }
    
    .toast.show {
      display: flex;
    }
    
    .toast.success {
      border-color: rgba(45, 212, 191, 0.3);
    }
    
    .toast-content {
      display: flex;
      align-items: center;
      gap: 12px;
      flex: 1;
    }
    
    .toast-icon {
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(45, 212, 191, 0.2);
      border-radius: 50%;
      color: #2DD4BF;
    }
    
    .toast-icon svg {
      width: 14px;
      height: 14px;
    }
    
    .toast-message {
      font-weight: 500;
      font-size: 0.95rem;
    }
    
    .toast-close {
      background: rgba(255, 255, 255, 0.1);
      border: none;
      color: white;
      cursor: pointer;
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 14px;
      transition: background 0.2s;
    }
    
    .toast-close:hover {
      background: rgba(255, 255, 255, 0.2);
    }
    
    @keyframes toastIn {
      from {
        transform: translateX(400px);
        opacity: 0;
      }
      to {
        transform: translateX(0);
        opacity: 1;
      }
    }
    
    @keyframes toastOut {
      from {
        transform: translateX(0);
        opacity: 1;
      }
      to {
        transform: translateX(400px);
        opacity: 0;
      }
    }
  </style>
</head>
<body>
  <div id="dashboard-container">
    {% load plotly_dash %}
    {% plotly_app_bootstrap name="DashboardApp" %}
  </div>

  <!-- Toast 提示 -->
  <div id="toast" class="toast success">
    <div class="toast-content">
      <span class="toast-icon">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12"></polyline>
        </svg>
      </span>
      <span class="toast-message" id="toast-message"></span>
    </div>
    <button class="toast-close" onclick="hideToast()">✕</button>
  </div>

  <script>
    function showToast(message, duration = 5000) {
      var toast = document.getElementById('toast');
      var messageElement = document.getElementById('toast-message');

      messageElement.textContent = message;
      toast.classList.add('show');

      setTimeout(function() {
        hideToast();
      }, duration);
    }

    function hideToast() {
      var toast = document.getElementById('toast');
      toast.style.animation = 'toastOut 0.3s ease-out forwards';
      setTimeout(function() {
        toast.classList.remove('show');
        toast.style.animation = '';
      }, 300);
    }

    function checkUrlParams() {
      var params = new URLSearchParams(window.location.search);
      var loginSuccess = params.get('login_success');
      var registerSuccess = params.get('register_success');
      var username = params.get('username');

      if (loginSuccess === 'true' && username) {
        showToast('欢迎回来，' + username + '！');
        localStorage.setItem('authState', JSON.stringify({
          authenticated: true,
          username: username
        }));
        window.history.replaceState({}, document.title, window.location.pathname);
      } else if (registerSuccess === 'true' && username) {
        showToast('注册成功，欢迎 ' + username + '！');
        localStorage.setItem('authState', JSON.stringify({
          authenticated: true,
          username: username
        }));
        window.history.replaceState({}, document.title, window.location.pathname);
      }
    }

    function updateAuthButtons(authenticated, username) {
      var iframe = document.querySelector('#dashboard-container iframe');
      if (!iframe || !iframe.contentWindow) {
        console.log('无法找到iframe');
        return;
      }

      try {
        var loginButton = iframe.contentWindow.document.getElementById('login-button');
        var userContainer = iframe.contentWindow.document.getElementById('user-info-container');

        if (authenticated && username) {
          if (loginButton) {
            loginButton.style.display = 'none';
          }
          if (userContainer) {
            userContainer.innerHTML = '<a href="/accounts/profile/" class="text-decoration-none"><button class="btn btn-sm rounded-pill fw-bold px-4" style="background: #3B82F6; color: white; border: none;">' + username + '</button></a>';
          }
        } else {
          if (loginButton) {
            loginButton.style.display = 'block';
          }
          if (userContainer) {
            userContainer.innerHTML = '';
          }
        }
      } catch (error) {
        console.log('更新按钮失败:', error);
      }
    }

    function loadAuthState() {
      try {
        var authState = localStorage.getItem('authState');
        if (authState) {
          var data = JSON.parse(authState);
          if (data.authenticated && data.username) {
            updateAuthButtons(true, data.username);
          }
        }
      } catch (error) {
        console.log('加载登录状态失败:', error);
      }
    }

    async function checkServerAuthStatus() {
      try {
        var response = await fetch('/accounts/api/auth-check/');
        var data = await response.json();

        if (data.authenticated && data.username) {
          localStorage.setItem('authState', JSON.stringify({
            authenticated: true,
            username: data.username
          }));
          updateAuthButtons(true, data.username);
        } else {
          localStorage.removeItem('authState');
          updateAuthButtons(false, null);
        }
      } catch (error) {
        console.log('检查服务器登录状态失败:', error);
        loadAuthState();
      }
    }

    window.addEventListener('DOMContentLoaded', function() {
      checkUrlParams();
      loadAuthState();
      setTimeout(checkServerAuthStatus, 1000);
      setInterval(checkServerAuthStatus, 60000);
    });
  </script>
</body>
</html>
