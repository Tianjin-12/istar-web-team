{% load plotly_dash %}
{% load static %}
<!DOCTYPE html>
<html>
<head>
  <title>{% block title %}Istar GEO Evaluator{% endblock %}</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}">
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
  
  <!-- GSAP 动画库 (可选) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
  
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  
  <style>
    /* 加载屏幕 */
    .loading-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #0A0A0A;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 99999;
      transition: opacity 0.8s ease, visibility 0.8s ease;
    }
    
    .loading-screen.fade-out {
      opacity: 0;
      visibility: hidden;
    }
    
    .loading-logo {
      font-family: 'Inter', sans-serif;
      font-weight: 900;
      font-size: 72px;
      letter-spacing: 0.15em;
      background: linear-gradient(135deg, #3B82F6 0%, #2DD4BF 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: blur(20px);
      opacity: 0.5;
      animation: logoReveal 2s ease-in-out forwards;
    }
    
    @keyframes logoReveal {
      0% { filter: blur(20px); opacity: 0.5; }
      50% { filter: blur(10px); opacity: 0.8; }
      100% { filter: blur(0px); opacity: 1; }
    }
    
    .loading-logo.explode {
      animation: logoExplode 0.6s ease-out forwards;
    }
    
    @keyframes logoExplode {
      0% { transform: scale(1); opacity: 1; }
      100% { transform: scale(4); opacity: 0; }
    }
    
    /* 主内容区 */
    #dashboard-container {
      width: 100%;
      height: 100vh;
      overflow: hidden;
    }
    
    #dashboard-container iframe {
      width: 100%;
      height: 100vh;
      border: none;
      overflow-y: auto;
    }
    
    /* Toast 提示 */
    .toast {
      position: fixed;
      bottom: 30px;
      right: 20px;
      background: #0F172A;
      color: white;
      padding: 14px 20px;
      border-radius: 12px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
      z-index: 10000;
      display: none;
      animation: toastIn 0.3s ease-out;
      min-width: 280px;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    
    .toast.show { display: flex; }
    
    .toast-content {
      display: flex;
      align-items: center;
      gap: 12px;
      flex: 1;
    }
    
    .toast-icon {
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .toast-icon i {
      color: #2DD4BF;
    }
    
    .toast-message {
      font-weight: 500;
    }
    
    .toast-close {
      background: rgba(255, 255, 255, 0.1);
      border: none;
      color: white;
      cursor: pointer;
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 14px;
      transition: background 0.2s;
    }
    
    .toast-close:hover {
      background: rgba(255, 255, 255, 0.2);
    }
    
    @keyframes toastIn {
      from {
        transform: translateX(400px);
        opacity: 0;
      }
      to {
        transform: translateX(0);
        opacity: 1;
      }
    }
    
    @keyframes toastOut {
      from {
        transform: translateX(0);
        opacity: 1;
      }
      to {
        transform: translateX(400px);
        opacity: 0;
      }
    }
  </style>
</head>
<body>
  <!-- 加载动画 -->
  <div class="loading-screen" id="loadingScreen">
    <div class="loading-logo" id="loadingLogo">ISTAR</div>
  </div>

  {% include 'mvp/navbar.html' %}
  
  <div class="main-content" style="padding-top: 10px; min-height: calc(100vh - 56px - 56px);">
    {% block content %}{% endblock %}
  </div>
  
  {% include 'mvp/footer.html' %}
  
  <!-- Toast 提示 -->
  <div class="toast" id="toast">
    <div class="toast-content">
      <span class="toast-icon"><i data-lucide="check-circle"></i></span>
      <span class="toast-message" id="toast-message"></span>
    </div>
    <button class="toast-close" onclick="hideToast()">✕</button>
  </div>

  <script>
    // 初始化 Lucide 图标
    lucide.createIcons();
    
    // 加载动画
    window.addEventListener('load', function() {
      setTimeout(function() {
        var logo = document.getElementById('loadingLogo');
        var screen = document.getElementById('loadingScreen');
        
        logo.classList.add('explode');
        
        setTimeout(function() {
          screen.classList.add('fade-out');
        }, 500);
      }, 1800);
    });
    
    // Toast 函数
    function showToast(message, duration = 5000) {
      var toast = document.getElementById('toast');
      var messageElement = document.getElementById('toast-message');
      
      messageElement.textContent = message;
      toast.classList.add('show');
      
      setTimeout(function() {
        hideToast();
      }, duration);
    }
    
    function hideToast() {
      var toast = document.getElementById('toast');
      toast.style.animation = 'toastOut 0.3s ease-out forwards';
      setTimeout(function() {
        toast.classList.remove('show');
        toast.style.animation = '';
      }, 300);
    }
    
    // URL 参数检查
    function checkUrlParams() {
      var params = new URLSearchParams(window.location.search);
      var loginSuccess = params.get('login_success');
      var registerSuccess = params.get('register_success');
      var username = params.get('username');
      var logoutSuccess = params.get('logout_success');
      
      if (loginSuccess === 'true' && username) {
        showToast('欢迎回来，' + username + '！');
        window.history.replaceState({}, document.title, window.location.pathname);
      } else if (registerSuccess === 'true' && username) {
        showToast('注册成功，欢迎 ' + username + '！');
      } else if (logoutSuccess === 'true') {
        showToast('您已退出登录');
        window.history.replaceState({}, document.title, window.location.pathname);
      }
    }
    
    function updateAuthButtons(authenticated, username) {
      try {
        var loginButton = document.getElementById('login-button');
        var userButton = document.getElementById('user-button');
        
        if (authenticated && username) {
          if (loginButton) loginButton.style.display = 'none';
          if (userButton) {
            userButton.textContent = username;
            userButton.style.display = 'inline-block';
          }
        } else {
          if (loginButton) loginButton.style.display = 'inline-block';
          if (userButton) userButton.style.display = 'none';
        }
      } catch (error) {
        console.log('更新按钮失败:', error);
      }
    }
    
    async function checkServerAuthStatus() {
      try {
        var response = await fetch('/accounts/api/auth-check/');
        var data = await response.json();
        updateAuthButtons(data.authenticated, data.username);
        
        var userButton = document.getElementById('user-button');
        var loginButton = document.getElementById('login-button');
        var currentIsLoggedIn = userButton && userButton.style.display !== 'none';
        
        if (data.authenticated && !currentIsLoggedIn) {
          showToast('欢迎回来，' + data.username + '！');
        } else if (!data.authenticated && currentIsLoggedIn) {
          showToast('您已退出登录');
        }
      } catch (error) {
        console.log('检查服务器登录状态失败:', error);
      }
    }
    
    document.addEventListener('DOMContentLoaded', function() {
      checkUrlParams();
      checkServerAuthStatus();
      setInterval(checkServerAuthStatus, 15000);
      
      var btnAgree = document.getElementById('btn-agree');
      if (btnAgree) {
        if (localStorage.getItem('userAgreed')) {
          btnAgree.textContent = '✓ 已知晓';
          btnAgree.disabled = true;
        }
        btnAgree.addEventListener('click', function() {
          localStorage.setItem('userAgreed', 'true');
          btnAgree.textContent = '✓ 已知晓';
          btnAgree.disabled = true;
        });
      }
    });
  </script>
  
  <script src="{% static 'js/bootstrap.bundle.min.js' %}"></script>
  {% block extra_script %}{% endblock %}
</body>
</html>
