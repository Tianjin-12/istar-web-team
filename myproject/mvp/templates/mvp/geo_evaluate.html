{% extends 'mvp/base.html' %}

{% load static %}

{% block title %}GEO服务商评估 - {% endblock %}

{% block content %}
<style>
  /* 页面容器 */
  .evaluate-page {
    padding: 32px 24px;
    max-width: 1600px;
    margin: 0 auto;
  }
  
  /* 页面头部 */
  .page-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 32px;
    flex-wrap: wrap;
    gap: 16px;
  }
  
  /* 排序按钮组 */
  .sort-group .btn-check:checked + .btn {
    background: #0F172A;
    color: white;
    border-color: #0F172A;
  }
  
  /* 品牌计数 */
  .brand-count {
    font-size: 1.1rem;
    font-weight: 600;
    color: #64748B;
  }
  
  .brand-count .count-number {
    font-size: 2rem;
    font-weight: 800;
    background: linear-gradient(135deg, #3B82F6 0%, #2DD4BF 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  
  /* 品牌卡片 - Glassmorphism */
  .brand-card {
    background: rgba(255, 255, 255, 0.9);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(226, 232, 240, 0.8);
    border-radius: 20px;
    padding: 24px;
    cursor: pointer;
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
  }
  
  .brand-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 3px;
    background: linear-gradient(90deg, #3B82F6 0%, #2DD4BF 100%);
    opacity: 0;
    transition: opacity 0.3s ease;
  }
  
  .brand-card:hover {
    transform: translateY(-4px) scale(1.02);
    box-shadow: 
      0 20px 40px rgba(0, 0, 0, 0.1),
      0 0 30px rgba(45, 212, 191, 0.1);
    border-color: rgba(45, 212, 191, 0.3);
  }
  
  .brand-card:hover::before {
    opacity: 1;
  }
  
  /* Logo 样式 */
  .brand-logo-wrapper {
    width: 72px;
    height: 72px;
    border-radius: 16px;
    background: linear-gradient(135deg, rgba(59, 130, 246, 0.1), rgba(45, 212, 191, 0.1));
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  
  .brand-logo {
    max-height: 48px;
    max-width: 100%;
    object-fit: contain;
    transition: transform 0.2s;
  }
  
  .brand-card:hover .brand-logo {
    transform: scale(1.1);
  }
  
  /* 品牌名称与标签 */
  .brand-name {
    font-size: 1.1rem;
    font-weight: 700;
    color: #1E293B;
    margin-bottom: 4px;
  }
  
  .brand-note {
    font-size: 0.8rem;
    color: #94A3B8;
  }
  
  /* 标签 - 微色块方案 */
  .tags-container {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 12px;
  }
  
  .tag-pill {
    display: inline-flex;
    align-items: center;
    padding: 4px 10px;
    background: rgba(15, 23, 42, 0.06);
    color: #0F172A;
    border-radius: 4px;
    font-size: 0.75rem;
    font-weight: 500;
    transition: all 0.2s;
  }
  
  .tag-pill:hover {
    background: rgba(15, 23, 42, 0.12);
  }
  
  .tag-pill.accent {
    background: rgba(45, 212, 191, 0.1);
    color: #0D9488;
  }
  
  /* 雷达图容器 */
  .radar-container {
    position: relative;
    height: 140px;
  }
  
  /* 了解程度条 */
  .understand-bar {
    height: 6px;
    background: rgba(15, 23, 42, 0.08);
    border-radius: 3px;
    margin-top: 12px;
    overflow: hidden;
  }
  
  .understand-fill {
    height: 100%;
    background: linear-gradient(90deg, #3B82F6 0%, #2DD4BF 100%);
    border-radius: 3px;
    transition: width 0.8s ease-out;
  }
  
  /* 点击提示 */
  .click-hint {
    font-size: 0.7rem;
    color: #CBD5E1;
    margin-top: 8px;
    opacity: 0;
    transition: opacity 0.2s;
  }
  
  .brand-card:hover .click-hint {
    opacity: 1;
  }
  
  /* 卡片入场动画 */
  .card-fade-enter {
    opacity: 0;
    transform: translateY(20px);
  }
  
  .card-fade-enter-active {
    opacity: 1;
    transform: translateY(0);
    transition: all 0.4s ease-out;
  }
  
  /* Modal 样式 */
  .modal-content {
    border: none;
    border-radius: 24px;
    overflow: hidden;
  }
  
  .modal-header {
    background: linear-gradient(135deg, #0F172A 0%, #1E293B 100%);
    color: white;
    border: none;
    padding: 24px 28px;
  }
  
  .modal-header .btn-close {
    filter: brightness(0) invert(1);
    opacity: 0.6;
  }
  
  .modal-header .btn-close:hover {
    opacity: 1;
  }
  
  .modal-body {
    padding: 28px;
  }
  
  /* Modal 雷达图 */
  .modal-radar {
    height: 300px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  
  /* Modal 标签 */
  .modal-tags .tag-pill {
    font-size: 0.85rem;
    padding: 6px 14px;
  }
  
  /* 进度条 */
  .progress-modern {
    height: 10px;
    border-radius: 5px;
    background: rgba(15, 23, 42, 0.08);
  }
  
  .progress-modern .progress-bar {
    background: linear-gradient(90deg, #3B82F6 0%, #2DD4BF 100%);
    border-radius: 5px;
  }
  
  /* 报价 */
  .price-tag {
    font-size: 1.5rem;
    font-weight: 800;
    background: linear-gradient(135deg, #3B82F6 0%, #2DD4BF 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  
  /* 链接样式 */
  .link-item {
    display: flex;
    align-items: center;
    gap: 8px;
    color: #3B82F6;
    text-decoration: none;
    padding: 8px 12px;
    border-radius: 8px;
    transition: all 0.2s;
  }
  
  .link-item:hover {
    background: rgba(59, 130, 246, 0.1);
    color: #2563EB;
  }
  
  /* Tooltip */
  .tooltip-custom {
    position: absolute;
    background: rgba(15, 23, 42, 0.95);
    color: white;
    padding: 8px 14px;
    border-radius: 8px;
    font-size: 0.85rem;
    font-family: 'SF Mono', 'Monaco', monospace;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.2s;
    z-index: 1000;
    white-space: nowrap;
    backdrop-filter: blur(8px);
  }
  
  .tooltip-custom.visible {
    opacity: 1;
  }
</style>

<div class="evaluate-page">
  <!-- 页面头部 -->
  <div class="page-header">
    <div class="btn-group sort-group" role="group">
      <input type="radio" class="btn-check" name="sortMethod" id="sort-tag" autocomplete="off" checked>
      <label class="btn btn-outline-dark rounded-pill" for="sort-tag" onclick="switchSort('tag')">
        按标签
      </label>
      <input type="radio" class="btn-check" name="sortMethod" id="sort-alphabet" autocomplete="off">
      <label class="btn btn-outline-dark rounded-pill" for="sort-alphabet" onclick="switchSort('alphabet')">
        按首字母
      </label>
    </div>
    
    <div class="text-end">
      <p class="brand-count mb-1">
        已收录 <span class="count-number" id="brand-count">10</span> 个品牌
      </p>
      <p class="text-muted mb-0" style="font-size: 0.8rem;">数据持续更新中 · 点击卡片查看详情</p>
    </div>
  </div>

  <!-- 品牌卡片网格 -->
  <div id="card-grid" class="row g-4">
  </div>
</div>

<!-- 详情 Modal -->
<div class="modal fade" id="detailModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered modal-xl">
    <div class="modal-content">
      <div class="modal-header">
        <div class="d-flex align-items-center gap-3">
          <div class="brand-logo-wrapper" style="width: 56px; height: 56px; border-radius: 12px;">
            <img id="modal-logo" src="" alt="Logo" style="max-height: 36px;">
          </div>
          <div>
            <h5 class="modal-title mb-1" id="modal-name"></h5>
            <p class="text-white-50 mb-0" style="font-size: 0.85rem;" id="modal-note"></p>
          </div>
        </div>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <div class="row g-4">
          <div class="col-lg-5">
            <div class="modal-radar">
              <canvas id="modal-radar-chart"></canvas>
            </div>
          </div>
          <div class="col-lg-7">
            <h6 class="text-muted mb-3" style="font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px;">核心标签</h6>
            <div id="modal-tags" class="modal-tags mb-4"></div>
            
            <h6 class="text-muted mb-3" style="font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px;">了解程度</h6>
            <div class="progress progress-modern mb-2">
              <div id="modal-progress" class="progress-bar" role="progressbar" style="width: 0%;"></div>
            </div>
            <p class="text-end small text-muted mb-4" id="modal-progress-text"></p>
            
            <h6 class="text-muted mb-3" style="font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px;">报价区间</h6>
            <div id="modal-price" class="price-tag mb-4"></div>
            
            <h6 class="text-muted mb-3" style="font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px;">相关链接</h6>
            <div class="d-flex gap-3 mb-4">
              <a id="modal-website" href="#" target="_blank" class="link-item">
                <i data-lucide="external-link" style="width: 16px; height: 16px;"></i>
                官方网站
              </a>
              <a id="modal-qcc" href="#" target="_blank" class="link-item">
                <i data-lucide="building-2" style="width: 16px; height: 16px;"></i>
                企查查
              </a>
            </div>
          </div>
        </div>
        
        <div class="border-top pt-4 mt-4">
          <h6 class="text-muted mb-3" style="font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px;">企业简介</h6>
          <p id="modal-description" class="mb-0" style="color: #64748B; line-height: 1.7;"></p>
        </div>
      </div>
      <div class="modal-footer border-0 justify-content-center pb-4">
        <a href="/dashboard/about/" target="_blank" class="text-muted small" style="text-decoration: none; border-bottom: 1px dashed #94A3B8;">
          发现数据有误？点击反馈
        </a>
      </div>
    </div>
  </div>
</div>

<!-- Tooltip -->
<div class="tooltip-custom" id="tooltip"></div>

let currentSort = 'tag';
let modalRadarChart = null;

function createRadarChart(canvasId, data, labels) {
  const ctx = document.getElementById(canvasId).getContext('2d');
  
  return new Chart(ctx, {
    type: 'radar',
    data: {
      labels: labels,
      datasets: [{
        data: data,
        backgroundColor: 'rgba(45, 212, 191, 0.2)',
        borderColor: 'rgba(45, 212, 191, 0.8)',
        borderWidth: 2,
        pointBackgroundColor: 'rgba(59, 130, 246, 1)',
        pointBorderColor: '#fff',
        pointHoverBackgroundColor: '#fff',
        pointHoverBorderColor: 'rgba(45, 212, 191, 1)',
        pointRadius: 4,
        pointHoverRadius: 6
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: true,
      scales: {
        r: {
          beginAtZero: true,
          max: 100,
          ticks: {
            stepSize: 20,
            font: { size: 10 },
            color: '#94A3B8',
            backdropColor: 'transparent'
          },
          pointLabels: {
            font: { size: 11, weight: '600' },
            color: '#64748B'
          },
          grid: {
            color: 'rgba(15, 23, 42, 0.08)'
          },
          angleLines: {
            color: 'rgba(15, 23, 42, 0.08)'
          }
        }
      },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: 'rgba(15, 23, 42, 0.95)',
          padding: 12,
          titleFont: { size: 14, weight: '600' },
          bodyFont: { size: 13, family: 'SF Mono, Monaco, monospace' },
          borderColor: 'rgba(45, 212, 191, 0.3)',
          borderWidth: 1,
          callbacks: {
            label: function(context) {
              return ' ' + context.raw + ' 分';
            }
          }
        }
      }
    }
  });
}

function renderCards(data) {
  const grid = document.getElementById('card-grid');
  grid.innerHTML = '';
  
  data.forEach((brand, index) => {
    const col = document.createElement('div');
    col.className = 'col-12 col-sm-6 col-md-4 col-lg-3';
    
    const card = document.createElement('div');
    card.className = 'brand-card card-fade-enter';
    card.onclick = () => showDetail(brand);
    card.style.animationDelay = `${index * 50}ms`;
    
    card.innerHTML = `
      <div class="d-flex align-items-start gap-3">
        <div class="brand-logo-wrapper">
          <img src="${brand.logo}" alt="${brand.name}" class="brand-logo">
        </div>
        <div style="flex: 1; min-width: 0;">
          <h6 class="brand-name">${brand.name}</h6>
          <p class="brand-note">${brand.note}</p>
        </div>
      </div>
      
      <div class="radar-container mt-3">
        <canvas id="radar-${brand.id}"></canvas>
      </div>
      
      <div class="tags-container">
        ${brand.tags.map(tag => `
          <span class="tag-pill ${tag.accent ? 'accent' : ''}">${tag.name}</span>
        `).join('')}
      </div>
      
      <div class="understand-bar">
        <div class="understand-fill" style="width: ${brand.understand}%"></div>
      </div>
      
      <p class="click-hint text-center mb-0">点击查看详情 →</p>
    `;
    
    col.appendChild(card);
    grid.appendChild(col);
    
    requestAnimationFrame(() => {
      card.classList.add('card-fade-enter-active');
    });
    
    setTimeout(() => {
      createRadarChart(`radar-${brand.id}`, brand.radar, ['价格', '质量', '交付', '服务', '技术', '创新']);
    }, 100 + index * 50);
  });
  
  lucide.createIcons();
}

function switchSort(sortMethod) {
  currentSort = sortMethod;
  let sortedData = [...brandData];
  
  if (sortMethod === 'alphabet') {
    sortedData.sort((a, b) => a.name.localeCompare(b.name, 'zh-CN'));
  } else if (sortMethod === 'tag') {
    sortedData.sort((a, b) => {
      const tagA = a.tags[0]?.name || '';
      const tagB = b.tags[0]?.name || '';
      return tagA.localeCompare(tagB, 'zh-CN');
    });
  }
  
  renderCards(sortedData);
}

function showDetail(brand) {
  document.getElementById('modal-logo').src = brand.logo;
  document.getElementById('modal-name').textContent = brand.name;
  document.getElementById('modal-note').textContent = brand.note;
  document.getElementById('modal-price').textContent = brand.price;
  document.getElementById('modal-website').href = brand.website;
  document.getElementById('modal-qcc').href = brand.qcc;
  document.getElementById('modal-description').textContent = brand.description;
  
  const progressBar = document.getElementById('modal-progress');
  progressBar.style.width = '0%';
  setTimeout(() => {
    progressBar.style.width = brand.understand + '%';
  }, 100);
  
  document.getElementById('modal-progress-text').textContent = `了解程度：${brand.understand}/100`;
  
  const tagsContainer = document.getElementById('modal-tags');
  tagsContainer.innerHTML = brand.tags.map(tag => `
    <span class="tag-pill ${tag.accent ? 'accent' : ''}">${tag.name}</span>
  `).join('');
  
  if (modalRadarChart) {
    modalRadarChart.destroy();
  }
  
  modalRadarChart = createRadarChart('modal-radar-chart', brand.radar, ['价格', '质量', '交付', '服务', '技术', '创新']);
  
  lucide.createIcons();
  
  const modal = new bootstrap.Modal(document.getElementById('detailModal'));
  modal.show();
}

// Tooltip 功能
const tooltip = document.getElementById('tooltip');

document.addEventListener('mousemove', function(e) {
  const target = e.target.closest('[data-tooltip]');
  if (target) {
    tooltip.textContent = target.dataset.tooltip;
    tooltip.style.left = e.pageX + 10 + 'px';
    tooltip.style.top = e.pageY + 10 + 'px';
    tooltip.classList.add('visible');
  } else {
    tooltip.classList.remove('visible');
  }
});

document.addEventListener('DOMContentLoaded', function() {
  document.getElementById('brand-count').textContent = brandData.length;
  renderCards(brandData);
});
</script>
{% endblock %}
