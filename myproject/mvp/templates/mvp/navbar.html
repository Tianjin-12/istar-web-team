{% load static %}
{% load plotly_dash %}
<nav class="navbar navbar-expand-lg navbar-glass">
  <div class="container">
    <a class="navbar-brand d-flex align-items-center" href="/dashboard/brand/" style="text-decoration: none;">
      <span class="istar-art-text">ISTAR</span>
      <img src="{% static 'images/logo.png' %}" alt="Logo" class="navbar-logo" style="margin-left: 8px;">
      <div style="display: flex; flex-direction: column; line-height: 1.2;">
        <strong style="font-size: 1.05rem; color: white;">GEO</strong>
        <small style="font-size: 0.6rem; color: rgba(255,255,255,0.6);">生态建构者</small>
      </div>
    </a>
    
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" style="border-color: rgba(255,255,255,0.3);">
      <span class="navbar-toggler-icon"></span>
    </button>
    
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item">
          <a class="nav-link nav-link-custom" href="/dashboard/brand/" id="nav-brand">
            <i data-lucide="bar-chart-2" style="width: 16px; height: 16px; vertical-align: -3px; margin-right: 6px;"></i>
            品牌可见度
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link nav-link-custom" href="/dashboard/geo-evaluate/" id="nav-geo">
            <i data-lucide="layers" style="width: 16px; height: 16px; vertical-align: -3px; margin-right: 6px;"></i>
            GEO服务商
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link nav-link-custom" href="/dashboard/ai-toxic/" id="nav-ai-toxic">
            <i data-lucide="shield-alert" style="width: 16px; height: 16px; vertical-align: -3px; margin-right: 6px;"></i>
            AI投毒监测
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link nav-link-custom" href="/dashboard/cgeo-wiki/" id="nav-cgeo">
            <i data-lucide="book-open" style="width: 16px; height: 16px; vertical-align: -3px; margin-right: 6px;"></i>
            知识库
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link nav-link-custom" href="/dashboard/about/" id="nav-about">
            <i data-lucide="users" style="width: 16px; height: 16px; vertical-align: -3px; margin-right: 6px;"></i>
            关于我们
          </a>
        </li>
      </ul>
      
      <div class="d-flex align-items-center ms-3">
        <div id="auth-buttons">
          {% if user.is_authenticated %}
          <a href="/accounts/profile/" class="text-decoration-none">
            <button class="btn btn-ghost btn-sm rounded-pill px-3" id="user-button" style="color: white; border-color: rgba(255,255,255,0.3);">
              <i data-lucide="user" style="width: 14px; height: 14px; vertical-align: -2px; margin-right: 4px;"></i>
              {{ user.username }}
            </button>
          </a>
          {% else %}
          <a href="/accounts/login/" class="btn btn-ghost btn-sm rounded-pill px-3" id="login-button" style="color: white; border-color: rgba(255,255,255,0.3);">
            <i data-lucide="log-in" style="width: 14px; height: 14px; vertical-align: -2px; margin-right: 4px;"></i>
            登录
          </a>
          {% endif %}
        </div>      
      </div>
    </div>
  </div>
</nav>

<script>
  // 初始化 Lucide 图标
  lucide.createIcons();
  
  // 高亮当前页面导航
  document.addEventListener('DOMContentLoaded', function() {
    var currentPath = window.location.pathname;
    var navLinks = document.querySelectorAll('.nav-link-custom');
    
    navLinks.forEach(function(link) {
      var href = link.getAttribute('href');
      if (currentPath.startsWith(href) && href !== '/') {
        link.classList.add('active');
      }
    });
  });
</script>
